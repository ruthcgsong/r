<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary Entry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
body{
  font-family:'Inter','Helvetica Neue',sans-serif;
  min-height:100vh;
  background:#0e1117;
  color:#c8cdd5;
  display:flex;justify-content:center;align-items:center;
  padding:24px;overflow-x:hidden;position:relative;
}
.ambient{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12}
.blob-1{width:500px;height:500px;top:-10%;left:-5%}
.blob-2{width:400px;height:400px;bottom:-8%;right:-5%}
.blob-3{width:300px;height:300px;top:40%;left:50%;transform:translateX(-50%)}

/* ============================================================
   FLOATING EMOJIS
   visibility:visible = ON  |  visibility:hidden = OFF
============================================================ */
.float-layer{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;visibility:visible}
@keyframes floatDrift{from{transform:translateX(-120px)}to{transform:translateX(calc(100vw + 120px))}}
.fl{position:absolute;animation:floatDrift linear infinite;opacity:.18;filter:grayscale(1) brightness(3);font-size:64px;line-height:1}
.fl::after{display:block}
.fl-1{top:4%;animation-duration:34s;animation-delay:-3s;font-size:58px}.fl-1::after{content:"☁️"}
.fl-2{top:14%;animation-duration:40s;animation-delay:-14s;font-size:68px}.fl-2::after{content:"☁️"}
.fl-3{top:25%;animation-duration:30s;animation-delay:-8s;font-size:54px}.fl-3::after{content:"🤍"}
.fl-4{top:35%;animation-duration:37s;animation-delay:-20s;font-size:62px}.fl-4::after{content:"☁️"}
.fl-5{top:46%;animation-duration:32s;animation-delay:-5s;font-size:60px}.fl-5::after{content:"🌸"}
.fl-6{top:56%;animation-duration:42s;animation-delay:-18s;font-size:56px}.fl-6::after{content:"🤍"}
.fl-7{top:66%;animation-duration:38s;animation-delay:-25s;font-size:64px}.fl-7::after{content:"🌸"}
.fl-8{top:76%;animation-duration:35s;animation-delay:-12s;font-size:58px}.fl-8::after{content:"☁️"}

.frame{position:relative;z-index:2;width:100%;max-width:720px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:56px 48px 48px}
.label{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.25em;margin-bottom:28px}
h1{font-size:2rem;font-weight:300;line-height:1.35;color:#f0f0f4;margin-bottom:8px;letter-spacing:-.01em}
h1 em{font-style:normal;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:500}
.tagline{font-size:.95rem;font-weight:300;margin-bottom:44px;line-height:1.6}
.divider{width:40px;height:1px;margin-bottom:40px}
.body-text{font-size:1.15rem;font-weight:300;line-height:1.8;margin-bottom:44px;max-width:600px}
.body-text strong{font-weight:500;color:#e0e0e8}
.cards{display:flex;gap:20px;margin-bottom:44px;flex-wrap:wrap}
.card{flex:1;min-width:260px;padding:24px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.card-tag{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.2em;margin-bottom:14px;display:inline-block;padding:3px 10px;border-radius:20px}
.card-body{font-size:.92rem;line-height:1.8}
.insights{margin-bottom:44px}
.insights-title{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.2em;margin-bottom:20px}
.insight{padding:16px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:16px;align-items:baseline}
.insight:last-child{border-bottom:none}
.insight-num{font-size:.7rem;font-weight:600;min-width:24px;padding-top:2px}
.insight-text{font-size:1rem;line-height:1.8;font-weight:300}
.insight-text em{font-style:normal;font-weight:400}
.closing{font-size:.95rem;font-weight:300;font-style:italic;line-height:1.7;padding-left:20px;margin-bottom:32px}
.credit{font-size:.65rem;letter-spacing:.08em}
</style>
</head>
<body>

<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="float-layer" aria-hidden="true">
  <div class="fl fl-1"></div><div class="fl fl-2"></div><div class="fl fl-3"></div>
  <div class="fl fl-4"></div><div class="fl fl-5"></div><div class="fl fl-6"></div>
  <div class="fl fl-7"></div><div class="fl fl-8"></div>
</div>

<div class="frame" id="frame"></div>

<script>
/* ================================================================
   ✦ EDIT ZONE — All your content lives here.
     Edit the values below, save, and the page updates.
     IMPORTANT: For multi-line text, use <br> for line breaks.
     Do NOT press Enter inside a "..." string.
================================================================ */

var CONTENT = {

  /* ---- COLOR PALETTE ----
     Pick one: "violet", "indigo", "blue", "teal", "amber", "rose"
  */
  palette: "violet",

  /* ---- TITLE BLOCK ---- */
  line1: "An ordinary day",
  line2: "<em>with dream, old photo and sound sleep</em>",
  line3: "I refused to sleep in the very early morning, and reluctant to wake up from that criminal-themed dream",
  line4: "R · 2025.3",

  /* ---- BODY PARAGRAPH ----
     Use <br> for line breaks. Use <strong>...</strong> for bold.
  */
  body: "明天就要出门了，今天需要做的事，真的很不情愿。研究了半天怎么克隆我的笔迹，但那玩意儿比声音可难搞多了。我还是亲自来吧，但是——要听着有意义的录音才能做那种无聊的事。<br><br>还是先睡会儿再说吧。",

  /* ---- CARDS (toggle: true = show, false = hide) ---- */
  showCards: false,
  cards: [
    { tag: "Label", body: "Card content here" },
  ],

  /* ---- INSIGHTS (toggle: true = show, false = hide) ---- */
  showInsights: true,
  insightsTitle: "Moments",
  insights: [
    { text: "<em>带角贴的照片，已安排上</em> 小娃娃们如今背后有布景了" },
    { text: "<em>碰碰香还在持续散发着香气</em> 它将是唤起我回忆的又一坐标。" },
  ],

  /* ---- CLOSING QUOTE (toggle: true = show, false = hide) ---- */
  showQuote: true,
  quote: "真是寻常却又值得记录的一天。",
};

/* ================================================================
   COLOR PRESETS — no need to edit
================================================================ */
var PALETTES = {
  violet: { accent:"rgba(139,92,246,", blob1:"#6366f1", blob2:"#8b5cf6", blob3:"#3b82f6" },
  indigo: { accent:"rgba(99,102,241,", blob1:"#6366f1", blob2:"#818cf8", blob3:"#4f46e5" },
  blue:   { accent:"rgba(59,130,246,", blob1:"#3b82f6", blob2:"#6366f1", blob3:"#2563eb" },
  teal:   { accent:"rgba(45,212,191,", blob1:"#2dd4bf", blob2:"#14b8a6", blob3:"#0d9488" },
  amber:  { accent:"rgba(210,175,100,", blob1:"#d4a84a", blob2:"#c89030", blob3:"#a07028" },
  rose:   { accent:"rgba(244,114,182,", blob1:"#f472b6", blob2:"#ec4899", blob3:"#db2777" },
};

/* ================================================================
   RENDER — no need to edit below
================================================================ */
(function render(){
  var C = CONTENT;
  var pal = typeof C.palette === "string" ? PALETTES[C.palette] : C.palette;
  var a = pal.accent;

  document.querySelector('.blob-1').style.background = pal.blob1;
  document.querySelector('.blob-2').style.background = pal.blob2;
  document.querySelector('.blob-3').style.background = pal.blob3;

  var html = '';

  html += '<p class="label" style="color:'+a+'0.7)">' + C.line1 + '</p>';
  html += '<h1>' + C.line2.replace(/<em>/g,'<em style="background:linear-gradient(135deg,'+a+'0.85),'+a+'0.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">') + '</h1>';
  html += '<p class="tagline" style="color:'+a+'0.5)">' + C.line3 + '</p>';
  html += '<div class="divider" style="background:linear-gradient(90deg,'+a+'0.5),transparent)"></div>';

  if (C.body) {
    html += '<p class="body-text" style="color:rgba(240,240,244,0.75)">' + C.body + '</p>';
  }

  if (C.showCards && C.cards && C.cards.length) {
    html += '<div class="cards">';
    C.cards.forEach(function(card, i) {
      var isLast = i === C.cards.length - 1;
      var tagBg = isLast ? a+'0.15)' : 'rgba(255,255,255,0.06)';
      var tagCol = isLast ? a+'0.8)' : 'rgba(200,205,213,0.5)';
      var border = isLast ? '1px solid '+a+'0.15)' : '1px solid rgba(255,255,255,0.06)';
      var bg = isLast ? a+'0.04)' : 'rgba(255,255,255,0.03)';
      html += '<div class="card" style="border:'+border+';background:'+bg+'">';
      html += '<p class="card-tag" style="background:'+tagBg+';color:'+tagCol+'">' + card.tag + '</p>';
      html += '<div class="card-body" style="color:rgba(200,205,213,0.6)">' + card.body + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  if (C.showInsights && C.insights && C.insights.length) {
    html += '<div class="insights">';
    html += '<p class="insights-title" style="color:'+a+'0.5)">' + C.insightsTitle + '</p>';
    C.insights.forEach(function(ins, i) {
      html += '<div class="insight">';
      html += '<span class="insight-num" style="color:'+a+'0.4)">' + String(i+1).padStart(2,'0') + '</span>';
      html += '<p class="insight-text" style="color:rgba(200,205,213,0.8);">' + ins.text.replace(/<em>/g,'<em style="color:rgba(245,245,250,0.95)">') + '</p>';
      html += '</div>';
    });
    html += '</div>';
  }

  if (C.showQuote && C.quote) {
    html += '<p class="closing" style="color:'+a+'0.55);border-left:2px solid '+a+'0.2)">' + C.quote + '</p>';
  }

  html += '<p class="credit" style="color:rgba(200,205,213,0.25)">' + C.line4 + '</p>';

  document.getElementById('frame').innerHTML = html;
})();
</script>
</body>
</html>
