<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Interpreter</title>
  <style>

    /* ============================================================
       CSS VARIABLES — primitive tokens only.
       Values are overridden by JS on each load (see EDIT ZONE 1).
       Lightness numbers encode depth/contrast — don't change those.
    ============================================================ */
    :root {
      --sat:        60%;
      --hue-bg:     260;
      --hue-mid:    270;
      --hue-bottom: 220;
      --hue-accent: 270;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(to bottom,
        hsl(var(--hue-bg),     var(--sat), 12%),
        hsl(var(--hue-mid),    var(--sat), 22%),
        hsl(var(--hue-bottom), var(--sat), 30%)
      );
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 48px 24px;
      position: relative;
      overflow-x: hidden;
    }

    .page-wrapper {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* --- Header --- */
    .page-header { text-align: center; margin-bottom: 48px; }
    .page-header h1 {
      font-size: 2.25rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      background: linear-gradient(to right,
        hsl(var(--hue-accent), calc(var(--sat) * 0.6), 82%),
        hsl(var(--hue-bottom), calc(var(--sat) * 0.5), 82%)
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }
    .page-header p {
      color: hsl(var(--hue-accent), calc(var(--sat) * 0.5), 80%);
      font-size: 1.05rem;
      opacity: 0.85;
    }

    /* --- Cards --- */
    .card {
      background: hsla(var(--hue-accent), var(--sat), 80%, 0.10);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid hsla(var(--hue-accent), var(--sat), 90%, 0.20);
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .card--guidance {
      background: linear-gradient(to right,
        hsla(var(--hue-bg), var(--sat), 35%, 0.30),
        hsla(var(--hue-bottom), var(--sat), 40%, 0.30)
      );
    }
    .card h2 {
      font-size: 1.4rem;
      font-weight: 300;
      margin-bottom: 1rem;
      color: white;
    }

    /* --- API key row --- */
    .key-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      align-items: center;
    }
    .key-row label {
      font-size: 0.8rem;
      color: hsl(var(--hue-accent), calc(var(--sat) * 0.4), 70%);
      white-space: nowrap;
    }
    .key-input {
      flex: 1;
      background: hsla(0, 0%, 100%, 0.06);
      border: 1px solid hsla(0, 0%, 100%, 0.12);
      border-radius: 0.5rem;
      padding: 0.45rem 0.75rem;
      color: white;
      font-size: 0.85rem;
      outline: none;
      font-family: monospace;
      min-width: 0;
    }
    .key-input:focus {
      border-color: hsl(var(--hue-accent), var(--sat), 65%);
    }

    /* --- Textarea --- */
    .dream-label {
      display: block;
      color: hsl(var(--hue-accent), calc(var(--sat) * 0.5), 80%);
      font-size: 1.05rem;
      margin-bottom: 0.75rem;
    }
    .dream-textarea {
      width: 100%;
      height: 148px;
      background: hsla(0, 0%, 100%, 0.05);
      border: 1px solid hsla(0, 0%, 100%, 0.10);
      border-radius: 0.75rem;
      padding: 1rem;
      color: white;
      font-size: 1rem;
      resize: none;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: inherit;
    }
    .dream-textarea::placeholder {
      color: hsla(var(--hue-accent), calc(var(--sat) * 0.3), 75%, 0.45);
    }
    .dream-textarea:focus {
      border-color: hsl(var(--hue-accent), var(--sat), 65%);
      box-shadow: 0 0 0 3px hsla(var(--hue-accent), var(--sat), 65%, 0.22);
    }

    /* --- Button --- */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 0.75rem;
      background: linear-gradient(to right,
        hsl(var(--hue-accent), var(--sat), 38%),
        hsl(var(--hue-bottom), var(--sat), 42%)
      );
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      margin-top: 1.25rem;
    }
    .btn-primary:hover:not(:disabled) { transform: scale(1.02); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- Error --- */
    .error-msg {
      display: none;
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      background: hsla(0, 60%, 50%, 0.20);
      border: 1px solid hsla(0, 60%, 60%, 0.40);
      border-radius: 0.6rem;
      color: hsl(0, 80%, 88%);
      font-size: 0.9rem;
    }

    /* --- Result cards --- */
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.65rem; }
    .tag {
      background: hsla(var(--hue-accent), var(--sat), 65%, 0.28);
      color: hsl(var(--hue-accent), calc(var(--sat) * 0.5), 84%);
      border: 1px solid hsla(var(--hue-accent), var(--sat), 70%, 0.30);
      border-radius: 9999px;
      padding: 0.35rem 1rem;
      font-size: 0.92rem;
    }
    .card-body-text {
      color: hsl(var(--hue-bottom), calc(var(--sat) * 0.5), 82%);
      line-height: 1.7;
    }
    .symbol-row { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 0.75rem; }
    .symbol-chip {
      background: hsla(var(--hue-accent), var(--sat), 65%, 0.18);
      color: hsl(var(--hue-accent), calc(var(--sat) * 0.5), 80%);
      font-weight: 500;
      padding: 0.45rem 0.85rem;
      border-radius: 0.5rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .symbol-meaning {
      color: hsl(var(--hue-accent), calc(var(--sat) * 0.4), 80%);
      line-height: 1.65;
    }
    .insight-text {
      color: hsl(var(--hue-mid), calc(var(--sat) * 0.35), 82%);
      line-height: 1.75;
      font-size: 1.03rem;
    }
    .guidance-text {
      color: hsl(50, calc(var(--sat) * 0.5), 92%);
      line-height: 1.75;
    }
    #result-section { display: none; }

    /* ============================================================
       ✦ FLOATING ELEMENTS
       Shape: external image via background-image.
       JS assigns URLs from EDIT ZONE 2 dynamically.
       To swap shape type: change .floater styles below.
    ============================================================ */
    .float-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    @keyframes drift {
      from { transform: translateX(-120px); }
      to   { transform: translateX(calc(100vw + 120px)); }
    }

    /* --- SVG floater shape --- */
    .floater {
      position: absolute;
      width: 72px;
      height: 72px;
      opacity: 0.22;
      animation: drift linear infinite;
    }
    .floater svg { width: 100%; height: 100%; }

    /* Varied sizes & timings per floater */
    .f1 { top:12%; animation-duration:26s; animation-delay:-2s;  width:60px; height:60px; }
    .f2 { top:33%; animation-duration:31s; animation-delay:-10s; width:76px; height:76px; }
    .f3 { top:56%; animation-duration:36s; animation-delay:-17s; width:64px; height:64px; }
    .f4 { top:72%; animation-duration:29s; animation-delay:-5s;  width:80px; height:80px; }
    .f5 { top:44%; animation-duration:33s; animation-delay:-22s; width:68px; height:68px; }

  </style>
</head>
<body>

  <!-- Floating icons layer -->
  <div class="float-layer" aria-hidden="true">
    <div class="floater f1"></div>
    <div class="floater f2"></div>
    <div class="floater f3"></div>
    <div class="floater f4"></div>
    <div class="floater f5"></div>
  </div>

  <div class="page-wrapper">

    <header class="page-header">
      <h1>Dream interpreter</h1>
      <p>Share your dream, discover its meaning ✨</p>
    </header>

    <!-- INPUT CARD -->
    <section class="card">
      <label class="dream-label" for="dream-input">Tell me about your dream...</label>
      <textarea
        id="dream-input"
        class="dream-textarea"
        placeholder="Describe your dream in as much detail as you can remember... ☁️"
      ></textarea>
      <button id="btn-interpret" class="btn-primary" onclick="interpretDream()">
        Interpret dream
      </button>
      <div id="error-msg" class="error-msg"></div>
    </section>

    <!-- RESULT CARDS (hidden until API returns) -->
    <div id="result-section">
      <section class="card">
        <h2>Main themes</h2>
        <div id="themes" class="tag-list"></div>
      </section>
      <section class="card">
        <h2>Emotional atmosphere</h2>
        <p id="emotion" class="card-body-text"></p>
      </section>
      <section class="card">
        <h2>Dream symbols</h2>
        <div id="symbols"></div>
      </section>
      <section class="card">
        <h2>Personal insight</h2>
        <p id="insight" class="insight-text"></p>
      </section>
      <section class="card card--guidance">
        <h2>Guidance for reflection</h2>
        <p id="guidance" class="guidance-text"></p>
      </section>
    </div>

  </div>

  <script>

    /* ============================================================
       ✦ EDIT ZONE 1 — COLOR PALETTES
       Each palette needs 4 hue numbers (0–360) and a sat string.
       Hue is the "color wheel position". Sat is how vivid.
       Add a new {} object to add a new palette.
       Delete a {} object to remove one.
    ============================================================ */
    const PALETTES = [
      { name:'Purple', bg:260, mid:270, bottom:220, accent:270, sat:'60%' },
      { name:'Indigo', bg:238, mid:244, bottom:228, accent:244, sat:'56%' },
      { name:'Blue',   bg:218, mid:224, bottom:208, accent:220, sat:'62%' },
      { name:'Cyan',   bg:192, mid:198, bottom:182, accent:194, sat:'52%' },
      { name:'Amber',  bg:34,  mid:27,  bottom:19,  accent:38,  sat:'46%' },
    ];

    /* ============================================================
       ✦ EDIT ZONE 2 — FLOATER SHAPES (inline SVG)
       Add a new template string to add a new shape.
       One shape is picked randomly per page load.
       All SVGs use fill="white" — change that to recolor.
    ============================================================ */
    const SHAPES = [

      /* Heart */
      `<svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 82 C15 55 2 40 2 26 C2 13 12 4 26 4
                 C35 4 44 9 50 17 C56 9 65 4 74 4
                 C88 4 98 13 98 26 C98 40 85 55 50 82Z"
              fill="white"/>
      </svg>`,

      /* Ice cream cone */
      `<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="44" r="26" fill="white"/>
        <circle cx="64" cy="44" r="26" fill="white"/>
        <circle cx="50" cy="28" r="22" fill="white"/>
        <polygon points="20,64 80,64 50,114" fill="white" opacity="0.78"/>
      </svg>`,

      /* Cake slice */
      `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 6 Q54 2 58 6 L94 72 L6 72 Z" fill="white"/>
        <rect x="6" y="72" width="88" height="22" rx="3" fill="white" opacity="0.85"/>
        <line x1="6"  y1="83" x2="94" y2="83" stroke="rgba(0,0,0,0.10)" stroke-width="4"/>
        <circle cx="50" cy="6" r="5" fill="white"/>
      </svg>`,

      /* Gift box */
      `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="8"  y="42" width="84" height="50" rx="3" fill="white"/>
        <rect x="8"  y="27" width="84" height="18" rx="3" fill="white" opacity="0.88"/>
        <path d="M50 27 C50 27 33 8 25 16 C17 24 33 27 50 27
                 C67 27 83 24 75 16 C67 8 50 27 50 27Z" fill="white"/>
        <rect x="45" y="27" width="10" height="50" fill="rgba(0,0,0,0.07)"/>
        <rect x="8"  y="36" width="84" height="9"  fill="rgba(0,0,0,0.07)"/>
      </svg>`,

    ];

    /* ============================================================
       INIT — runs once on page load. Don't need to edit below here.
    ============================================================ */

    // Pick and apply a random palette
    (function applyRandomPalette() {
      const p = PALETTES[Math.floor(Math.random() * PALETTES.length)];
      const r = document.documentElement.style;
      r.setProperty('--sat',        p.sat);
      r.setProperty('--hue-bg',     p.bg);
      r.setProperty('--hue-mid',    p.mid);
      r.setProperty('--hue-bottom', p.bottom);
      r.setProperty('--hue-accent', p.accent);
    })();

    // Pick 1 random shape, inject into all floaters (sizes vary via .f1–.f5)
    (function applyRandomIcons() {
      const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      document.querySelectorAll('.floater').forEach(el => {
        el.innerHTML = shape;
      });
    })();

    /* ============================================================
       CLAUDE API CALL — uses window.claude.complete() (free in Claude.ai)
       To switch to GitHub hosting later: replace this function with
       the direct fetch() version and add back the API key input.
    ============================================================ */
    async function interpretDream() {
      const dreamText = document.getElementById('dream-input').value.trim();
      const btn = document.getElementById('btn-interpret');
      const errEl = document.getElementById('error-msg');

      if (!dreamText) return;

      btn.disabled = true;
      btn.textContent = 'Interpreting...';
      errEl.style.display = 'none';
      document.getElementById('result-section').style.display = 'none';

      try {
        const prompt =
          `You are a compassionate dream interpreter. Analyze this dream and respond ONLY with a raw JSON object — no markdown, no backticks, no explanation outside the JSON.\n\n` +
          `Format:\n{"mainThemes":["...","...","..."],"emotionalTone":"...","symbols":[{"symbol":"...","meaning":"..."},{"symbol":"...","meaning":"..."}],"personalInsight":"...","guidance":"..."}\n\n` +
          `Dream: "${dreamText}"`;

        const raw = await window.claude.complete(prompt);
        showResult(JSON.parse(raw.replace(/```json|```/g, '').trim()));

      } catch(e) {
        errEl.style.display = 'block';
        errEl.textContent = 'Could not interpret dream: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Interpret dream';
      }
    }

    function showResult(d) {
      document.getElementById('themes').innerHTML =
        d.mainThemes.map(t => `<span class="tag">${t}</span>`).join('');
      document.getElementById('emotion').textContent = d.emotionalTone;
      document.getElementById('symbols').innerHTML =
        d.symbols.map(s =>
          `<div class="symbol-row">
             <span class="symbol-chip">${s.symbol}</span>
             <p class="symbol-meaning">${s.meaning}</p>
           </div>`
        ).join('');
      document.getElementById('insight').textContent = d.personalInsight;
      document.getElementById('guidance').textContent = d.guidance;
      document.getElementById('result-section').style.display = 'block';
      document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
    }

  </script>
</body>
</html>
