<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Lighter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Georgia','Times New Roman',serif;
  min-height:100vh;min-height:100dvh;
  display:flex;justify-content:center;align-items:center;
  background:#E4EEF9;
  transition:background-color .8s ease;
  overflow:hidden;
  position:relative;
}

/* Floating particles */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{
  position:absolute;border-radius:50%;
  opacity:0;animation:floatUp linear infinite;
  pointer-events:none;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) scale(.5)}
  15%{opacity:.6}
  85%{opacity:.4}
  100%{opacity:0;transform:translateY(-100vh) scale(1)}
}

/* Main card */
.card{
  position:relative;z-index:1;
  width:100%;max-width:440px;
  margin:24px;
  padding:44px 32px 36px;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.6);
  border-radius:28px;
  text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
}

.title{
  font-size:1.1rem;font-weight:400;
  letter-spacing:.12em;
  color:#7a8a9a;
  margin-bottom:8px;
}
.subtitle{
  font-size:.8rem;
  letter-spacing:.08em;
  color:#a0aab4;
  margin-bottom:36px;
}

/* Memory display area */
.memory-area{
  min-height:200px;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:20px 0;
}

.field-label{
  font-size:.65rem;
  text-transform:uppercase;
  letter-spacing:.2em;
  color:#a0aab4;
  margin-bottom:8px;
}

.item-display{
  font-size:1.8rem;
  color:#4a5568;
  font-weight:400;
  line-height:1.4;
  margin-bottom:24px;
  min-height:2.6em;
  display:flex;align-items:center;justify-content:center;
  word-break:break-word;
  max-width:340px;
  transition:opacity .4s ease;
}

.divider{
  width:40px;height:1px;
  background:linear-gradient(90deg,transparent,#b8c4d0,transparent);
  margin-bottom:24px;
}

.quote-display{
  font-size:1.05rem;
  color:#6b7b8a;
  font-style:italic;
  line-height:1.7;
  min-height:3em;
  display:flex;align-items:center;justify-content:center;
  word-break:break-word;
  max-width:320px;
  transition:opacity .4s ease;
}

/* Button */
.light-btn{
  margin-top:32px;
  padding:14px 44px;
  border:1.5px solid rgba(120,140,160,.3);
  border-radius:40px;
  background:rgba(255,255,255,.5);
  color:#5d6d7e;
  font-family:'Georgia',serif;
  font-size:.9rem;
  letter-spacing:.1em;
  cursor:pointer;
  transition:all .3s ease;
  backdrop-filter:blur(4px);
}
.light-btn:hover{
  background:rgba(255,255,255,.8);
  border-color:rgba(120,140,160,.5);
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(0,0,0,.06);
}
.light-btn:active{transform:scale(.97)}

.footer{
  margin-top:24px;
  font-size:.7rem;
  color:#a8b4c0;
  letter-spacing:.06em;
}

/* Add memory */
.add-btn{
  margin-top:20px;
  padding:8px 24px;
  border:1.5px dashed rgba(120,140,160,.25);
  border-radius:20px;
  background:transparent;
  color:#a0aab4;
  font-family:'Georgia',serif;
  font-size:.8rem;
  letter-spacing:.06em;
  cursor:pointer;
  transition:all .3s ease;
}
.add-btn:hover{
  border-color:rgba(120,140,160,.45);
  color:#7a8a9a;
  background:rgba(255,255,255,.2);
}
.add-btn.open{
  border-color:rgba(120,140,160,.35);
  color:#7a8a9a;
}

.add-panel{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:max-height .4s ease,opacity .3s ease;
  width:100%;
  margin-top:12px;
}
.add-panel.open{
  opacity:1;
}

.input-group{
  margin-bottom:12px;
}

.mem-input{
  width:100%;
  padding:12px 16px;
  border:1px solid rgba(120,140,160,.18);
  border-radius:12px;
  background:rgba(255,255,255,.35);
  backdrop-filter:blur(4px);
  font-family:'Georgia',serif;
  font-size:.9rem;
  color:#4a5568;
  outline:none;
  transition:border-color .3s ease;
  resize:none;
}
.mem-input::placeholder{
  color:#a8b4c0;
  font-style:italic;
}
.mem-input:focus{
  border-color:rgba(120,140,160,.4);
}
.mem-textarea{
  min-height:64px;
}

.submit-btn{
  padding:10px 32px;
  border:none;
  border-radius:20px;
  background:rgba(120,140,160,.15);
  color:#5d6d7e;
  font-family:'Georgia',serif;
  font-size:.85rem;
  letter-spacing:.04em;
  cursor:pointer;
  transition:all .3s ease;
}
.submit-btn:hover{
  background:rgba(120,140,160,.25);
  transform:translateY(-1px);
}

/* Fade animation */
.fade-out{opacity:0}
.fade-in{opacity:1}
</style>
</head>
<body>

<div id="particles"></div>

<div class="card">
  <p class="title">✨ Today's Memory to Touch ✨</p>
  <p class="subtitle">a small light for Amy</p>

  <div class="memory-area">
    <p class="field-label">Item</p>
    <div class="item-display" id="itemDisplay">☕</div>
    <div class="divider"></div>
    <p class="field-label">Quote</p>
    <div class="quote-display" id="quoteDisplay">🔑</div>
  </div>

  <button class="light-btn" id="lightBtn">Light Up</button>
  <p class="footer">tap the button, and a memory sparkles </p>

  <!-- Add memory button -->
  <button class="add-btn" id="addBtn" onclick="toggleAdd()">+ Add</button>

  <div class="add-panel" id="addPanel">
    <div class="input-group">
      <input type="text" class="mem-input" placeholder="an item" id="inputItem">
    </div>
    <div class="input-group">
      <textarea class="mem-input mem-textarea" placeholder="quote (optional)" id="inputQuote"></textarea>
    </div>
    <button class="submit-btn" onclick="submitMemory()">Send!</button>
  </div>
</div>

<script>
/* ===================== DATA ===================== */

var items = [
  // Shanghai
  "A cup of coffee from Manner ☕",
  "Matcha latte from a café beside Ole 🍵",
  "Oriental Pearl Tower at dusk 🌆",
  "The Bund lit up at night ✨",
  "Cherry blossoms in Botanical Garden 🌸",
  "Jing'an Temple in morning light 🏯",
  "Fuxing Park on a Sunday afternoon 🌿",
  "TSUTAYA Bookstore (蔦屋書店), the quiet second floor 📖",
  "Osmanthus fragrance drifting through an old lane 🌼",
  // London
  "A warm scone with clotted cream 🫖",
  "Fish and chips wrapped in paper 🐟",
  "A red phone box in the rain ☎️",
  "A pint by the canal 🍺",
  "Pigeons fighting over a croissant in the park 🐦",
  "A window seat on the upper deck of a bus 🚌",
  // Glasgow
  "A roll and square sausage from a café 🥪",
  "Rain drumming on a skylight ☔",
  // Others
  "A Moomin story filled with something warm 💛",
  "Totoro waiting at a bus stop in the rain 🌂",
  "A bottle of fragrance you keep but rarely wear 🌸",
  "A postcard you bought but never sent 💌",
  "The first sip of tea after a long walk 🍵",
  "A song you haven't heard in years, suddenly playing 🎵",
  "A haiku in a notebook you forgot about 📓",
  "The sound of rain when you're already inside 🌧️",
  "A window glowing yellow from the street below 🪟",
  "Stamps in a passport, slightly faded 🛂"
];

var quotes = [
  // Encouraging / universal
  "Let the coffee start your day ☕",
  "Something good is on its way — be patient 🌿",
  "The wait is part of the story too 🕊️",
  // For job seekers
  "The job that's meant for you won't need you to shrink ✨",
  "Your next chapter is still being written 📝",
  "The right place will feel like breathing out 🍃",
  // For travelers / expats
  "Only those who risk going too far can possibly find out how far one can go 🧭",
  "Every city you live in becomes part of your story 🗺️",
  "The bravest thing you ever did was leave, and the second bravest was staying 🌊",
  // Shanghai / Chinese
  "西番尼 欢喜侬 🍰",
  "外面的世界很大，弄堂里的世界也很美 🏠",
  "侬哈结棍额！🌸",
  "阿拉上海小囡就是嗲！💛"
];

/* ===================== MORANDI PALETTE ===================== */
var palette = [
  "#E4EEF9","#D5E8F6","#CFD9FB","#F0EAD6","#E2DFD2",
  "#D6E1E0","#E1D7D0","#E9D8D4","#D4E0E6","#D9D0C5",
  "#E6E1D2","#DAC9C0","#D4D9D0","#E0D3C6","#CDD9D0"
];

/* ===================== PARTICLES ===================== */
var particleLayer = document.getElementById('particles');
var warmColors = [
  'rgba(222,190,150,','rgba(210,170,140,','rgba(200,160,130,',
  'rgba(230,200,170,','rgba(218,180,155,','rgba(238,210,180,',
  'rgba(190,165,140,','rgba(225,195,165,'
];

function spawnParticle(){
  var el = document.createElement('div');
  el.className = 'particle';
  var size = 3 + Math.random() * 8;
  var x = Math.random() * 100;
  var dur = 6 + Math.random() * 10;
  var delay = Math.random() * 8;
  var col = warmColors[Math.floor(Math.random() * warmColors.length)];
  var opacity = (.3 + Math.random() * .4).toFixed(2);

  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = x + '%';
  el.style.bottom = '-20px';
  el.style.background = col + opacity + ')';
  el.style.animationDuration = dur + 's';
  el.style.animationDelay = delay + 's';
  particleLayer.appendChild(el);
}

// Spawn initial batch
for(var i = 0; i < 30; i++) spawnParticle();
// Keep spawning slowly
setInterval(function(){
  if(particleLayer.children.length < 40) spawnParticle();
  // Remove old particles that have finished
  if(particleLayer.children.length > 50){
    particleLayer.removeChild(particleLayer.firstChild);
  }
}, 1500);

/* ===================== LIGHT UP ===================== */
var itemEl = document.getElementById('itemDisplay');
var quoteEl = document.getElementById('quoteDisplay');
var lastItemIdx = -1, lastQuoteIdx = -1;

function pickRandom(arr, lastIdx){
  var idx;
  do { idx = Math.floor(Math.random() * arr.length); } while(idx === lastIdx && arr.length > 1);
  return idx;
}

/* Add panel toggle */
function toggleAdd(){
  var btn=document.getElementById('addBtn');
  var panel=document.getElementById('addPanel');
  var isOpen=panel.classList.contains('open');
  btn.classList.toggle('open');
  panel.classList.toggle('open');
  if(!isOpen){
    panel.style.maxHeight=panel.scrollHeight+40+'px';
    btn.textContent='✕ Close';
  }else{
    panel.style.maxHeight='0';
    btn.textContent='+ Add';
  }
}

function submitMemory(){
  var item=document.getElementById('inputItem').value.trim();
  var quote=document.getElementById('inputQuote').value.trim();
  if(!item){document.getElementById('inputItem').focus();return}

  var btn=document.querySelector('.submit-btn');
  btn.textContent='Sending...';
  btn.style.pointerEvents='none';

  fetch('https://formspree.io/f/mkoqnkpk',{
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify({item:item, quote:quote||'(no quote)'})
  }).then(function(r){
    if(r.ok){
      btn.textContent='Sent 💛';
      document.getElementById('inputItem').value='';
      document.getElementById('inputQuote').value='';
      setTimeout(function(){
        btn.textContent='Send! ✨';
        btn.style.pointerEvents='auto';
        toggleAdd();
      },1500);
    }else{
      btn.textContent='Oops, try again';
      btn.style.pointerEvents='auto';
      setTimeout(function(){btn.textContent='Send! ✨'},2000);
    }
  }).catch(function(){
    btn.textContent='Oops, try again';
    btn.style.pointerEvents='auto';
    setTimeout(function(){btn.textContent='Send! ✨'},2000);
  });
}

document.getElementById('lightBtn').addEventListener('click', function(){
  // Fade out
  itemEl.classList.add('fade-out');
  quoteEl.classList.add('fade-out');

  setTimeout(function(){
    // Pick new random item & quote (avoid repeats)
    lastItemIdx = pickRandom(items, lastItemIdx);
    lastQuoteIdx = pickRandom(quotes, lastQuoteIdx);

    itemEl.textContent = items[lastItemIdx];
    quoteEl.textContent = quotes[lastQuoteIdx];

    // Change background
    document.body.style.backgroundColor = palette[Math.floor(Math.random() * palette.length)];

    // Fade in
    itemEl.classList.remove('fade-out');
    quoteEl.classList.remove('fade-out');
  }, 350);
});
</script>
</body>
</html>
