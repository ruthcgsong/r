<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Fortune Palette Café</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Georgia',serif;
  min-height:100vh;min-height:100dvh;
  display:flex;justify-content:center;align-items:center;
  background:#f5f0eb;color:#4a4a4a;
  transition:background-color 1s ease,color 1s ease;
  overflow-x:hidden;
}
.container{
  width:100%;max-width:420px;
  min-height:100vh;min-height:100dvh;
  padding:40px 28px;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  position:relative;z-index:2;
}
.screen{display:none;width:100%;text-align:center;animation:fadeIn .6s ease}
.screen.active{display:flex;flex-direction:column;align-items:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.intro-title{font-size:1.8rem;font-weight:400;letter-spacing:.03em;margin-bottom:16px;line-height:1.3}
.intro-sub{font-size:1rem;opacity:.65;margin-bottom:36px;line-height:1.7}

/* Language toggle */
.lang-toggle{
  display:flex;gap:0;margin-bottom:36px;
  border:1.5px solid rgba(0,0,0,.12);border-radius:24px;
  overflow:hidden;
}
.lang-btn{
  padding:8px 20px;
  font-family:'Georgia',serif;font-size:.85rem;
  background:transparent;border:none;color:inherit;
  cursor:pointer;transition:all .3s ease;
  opacity:.5;
}
.lang-btn.active{
  background:rgba(0,0,0,.08);opacity:1;
}

.progress{display:flex;gap:8px;margin-bottom:32px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.12);transition:all .4s ease}
.dot.filled{background:rgba(0,0,0,.35);transform:scale(1.15)}
.dot.current{background:rgba(0,0,0,.25);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.q-number{font-size:.75rem;text-transform:uppercase;letter-spacing:.15em;opacity:.45;margin-bottom:20px}
.q-text{font-size:1.2rem;line-height:1.55;margin-bottom:36px;font-weight:400;max-width:340px}
.choices{width:100%;display:flex;flex-direction:column;gap:14px}
.choice-btn{
  width:100%;padding:18px 22px;
  border:1.5px solid rgba(0,0,0,.1);border-radius:16px;
  background:rgba(255,255,255,.4);backdrop-filter:blur(6px);
  font-family:'Georgia',serif;font-size:.95rem;line-height:1.5;
  color:inherit;cursor:pointer;text-align:left;
  transition:all .3s ease;
}
.choice-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06);border-color:rgba(0,0,0,.2)}
.choice-btn:active{transform:scale(.98)}
.feedback{font-size:.85rem;opacity:0;margin-top:22px;font-style:italic;transition:opacity .5s ease;min-height:1.4em}
.feedback.visible{opacity:.55}

.start-btn{
  padding:15px 44px;border:none;border-radius:40px;
  background:#4a4a4a;color:#f5f0eb;
  font-family:'Georgia',serif;font-size:.95rem;
  cursor:pointer;transition:all .3s ease;letter-spacing:.04em;
}
.start-btn:hover{transform:translateY(-2px);opacity:.9}

.result-wrap{position:relative;width:100%;display:flex;flex-direction:column;align-items:center}
.patches-layer{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:460px;height:280px;z-index:0;pointer-events:none;overflow:visible}
.result-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.2em;opacity:.45;margin-bottom:10px;z-index:1;position:relative}
.result-title{font-size:1.65rem;margin-bottom:6px;font-weight:400;z-index:1;position:relative}
.result-sub{font-size:.95rem;opacity:.6;margin-bottom:28px;line-height:1.6;z-index:1;position:relative}

.palette-row{display:flex;gap:14px;margin-bottom:36px;z-index:3;position:relative}
.swatch-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.swatch{
  width:50px;height:50px;border-radius:50%;
  border:2px solid rgba(255,255,255,.5);
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  transition:all .3s ease;cursor:pointer;
}
.swatch:hover{transform:scale(1.35);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.hex-tip{
  position:absolute;top:-30px;
  font-size:.7rem;font-family:monospace;letter-spacing:.04em;
  opacity:0;transform:translateY(4px);
  transition:all .25s ease;white-space:nowrap;pointer-events:none;
  background:rgba(0,0,0,.6);color:#fff;padding:3px 8px;border-radius:6px;
}
.swatch-wrap:hover .hex-tip{opacity:1;transform:translateY(0)}
.copied-msg{
  position:absolute;bottom:-24px;
  font-size:.65rem;font-family:'Georgia',serif;
  opacity:0;transition:opacity .3s ease;white-space:nowrap;
}
.copied-msg.show{opacity:.6}

.result-desc{
  font-size:1.1rem;line-height:1.8;opacity:.75;
  margin-bottom:36px;max-width:340px;
  z-index:1;position:relative;margin-top:12px;
}

#floatLayer{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:1;overflow:hidden;
  opacity:0;transition:opacity 1.2s ease;
}
#floatLayer.visible{opacity:1}
.clipart{position:absolute;will-change:transform}
.clipart svg{width:100%;height:100%}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.clipart-inner{animation:breathe 3s ease-in-out infinite;display:block}

#cursorGlow{
  position:fixed;width:120px;height:120px;border-radius:50%;
  pointer-events:none;z-index:0;opacity:0;
  transition:opacity .4s ease;transform:translate(-50%,-50%);
  mix-blend-mode:screen;
}
#cursorGlow.visible{opacity:1}
</style>
</head>

</div>

  cat:'<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><ellipse cx="20" cy="26" rx="9" ry="10" fill="CCC" opacity=".4"/><polygon points="11,16 14,8 18,16" fill="CCC" opacity=".4"/><polygon points="29,16 26,8 22,16" fill="CCC" opacity=".4"/><circle cx="16" cy="22" r="1.3" fill="CCC" opacity=".7"/><circle cx="24" cy="22" r="1.3" fill="CCC" opacity=".7"/><line x1="6" y1="23" x2="14" y2="24" stroke="CCC" stroke-width=".8" opacity=".3"/><line x1="34" y1="23" x2="26" y2="24" stroke="CCC" stroke-width=".8" opacity=".3"/></svg>',
  dog:'<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><ellipse cx="20" cy="25" rx="9" ry="10" fill="CCC" opacity=".4"/><ellipse cx="12" cy="14" rx="5" ry="7" fill="CCC" opacity=".3" transform="rotate(-15 12 14)"/><ellipse cx="28" cy="14" rx="5" ry="7" fill="CCC" opacity=".3" transform="rotate(15 28 14)"/><circle cx="17" cy="22" r="1.3" fill="CCC" opacity=".7"/><circle cx="23" cy="22" r="1.3" fill="CCC" opacity=".7"/><ellipse cx="20" cy="26" rx="2.5" ry="2" fill="CCC" opacity=".5"/></svg>',
  bee:'<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><ellipse cx="20" cy="22" rx="7" ry="9" fill="CCC" opacity=".4"/><line x1="15" y1="18" x2="25" y2="18" stroke="CCC" stroke-width="1.2" opacity=".25"/><line x1="14" y1="22" x2="26" y2="22" stroke="CCC" stroke-width="1.2" opacity=".25"/><ellipse cx="14" cy="13" rx="5" ry="3.5" fill="CCC" opacity=".2" transform="rotate(-30 14 13)"/><ellipse cx="26" cy="13" rx="5" ry="3.5" fill="CCC" opacity=".2" transform="rotate(30 26 13)"/></svg>',
  firework:'<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="2" fill="CCC" opacity=".5"/><g stroke="CCC" stroke-width="1.2" stroke-linecap="round" opacity=".35"><line x1="20" y1="12" x2="20" y2="4"/><line x1="20" y1="28" x2="20" y2="36"/><line x1="12" y1="20" x2="4" y2="20"/><line x1="28" y1="20" x2="36" y2="20"/><line x1="14" y1="14" x2="8" y2="8"/><line x1="26" y1="26" x2="32" y2="32"/><line x1="26" y1="14" x2="32" y2="8"/><line x1="14" y1="26" x2="8" y2="32"/></g></svg>'
};
var AESTH_CLIPS = {a:["waves","flower","leaf","spiral"],b:["bunny","cat","dog","bee","firework","spiral"]};

/* ===================== WATERCOLOR PATCHES (pre-generated) ===================== */
var patchShapes = null;
function initPatchShapes(){
  function blobPath(cx,cy,baseR,wobble,n){
    var pts=[];
    for(var j=0;j<n;j++){var a=(j/n)*Math.PI*2;var r=baseR*(.65+Math.random()*wobble);pts.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r})}
    var d='M'+pts[0].x.toFixed(1)+','+pts[0].y.toFixed(1);
    for(var j=0;j<pts.length;j++){
      var p0=pts[(j-1+pts.length)%pts.length],p1=pts[j],p2=pts[(j+1)%pts.length],p3=pts[(j+2)%pts.length];
      var c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6,c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;
      d+=' C'+c1x.toFixed(1)+','+c1y.toFixed(1)+' '+c2x.toFixed(1)+','+c2y.toFixed(1)+' '+p2.x.toFixed(1)+','+p2.y.toFixed(1);
    }
    return d+'Z';
  }
  patchShapes={blobs:[],satellites:[],dots:[]};
  var centers=[{cx:180+Math.random()*60,cy:110+Math.random()*40,r:90+Math.random()*35},{cx:240+Math.random()*60,cy:130+Math.random()*30,r:80+Math.random()*30},{cx:130+Math.random()*50,cy:140+Math.random()*30,r:70+Math.random()*25},{cx:280+Math.random()*40,cy:100+Math.random()*40,r:60+Math.random()*25}];
  for(var i=0;i<4;i++){var c=centers[i];patchShapes.blobs.push({d:blobPath(c.cx,c.cy,c.r,.65,12),fx:(.35+Math.random()*.3).toFixed(2),fy:(.3+Math.random()*.35).toFixed(2),midStop:(30+Math.random()*25).toFixed(0)})}
  for(var i=0;i<4;i++) patchShapes.satellites.push({d:blobPath(70+Math.random()*320,50+Math.random()*160,22+Math.random()*22,.8,8)});
  for(var i=0;i<15;i++) patchShapes.dots.push({cx:(50+Math.random()*360).toFixed(1),cy:(30+Math.random()*200).toFixed(1),r:(1+Math.random()*3.5).toFixed(1)});
}
initPatchShapes();

function drawPatches(color){
  var svg=document.getElementById('patches');svg.innerHTML='';
  svg.setAttribute('viewBox','0 0 460 280');
  function hexToRgb(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)}
  var rgb=hexToRgb(color);
  var defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
  var f1=document.createElementNS("http://www.w3.org/2000/svg","filter");
  f1.setAttribute('id','wcB');f1.setAttribute('x','-40%');f1.setAttribute('y','-40%');f1.setAttribute('width','180%');f1.setAttribute('height','180%');
  var bl=document.createElementNS("http://www.w3.org/2000/svg","feGaussianBlur");bl.setAttribute('stdDeviation','7');f1.appendChild(bl);defs.appendChild(f1);
  var f2=document.createElementNS("http://www.w3.org/2000/svg","filter");
  f2.setAttribute('id','wcT');f2.setAttribute('x','-30%');f2.setAttribute('y','-30%');f2.setAttribute('width','160%');f2.setAttribute('height','160%');
  var tb=document.createElementNS("http://www.w3.org/2000/svg","feTurbulence");tb.setAttribute('type','fractalNoise');tb.setAttribute('baseFrequency','0.035');tb.setAttribute('numOctaves','4');tb.setAttribute('result','n');f2.appendChild(tb);
  var dm=document.createElementNS("http://www.w3.org/2000/svg","feDisplacementMap");dm.setAttribute('in','SourceGraphic');dm.setAttribute('in2','n');dm.setAttribute('scale','22');dm.setAttribute('xChannelSelector','R');dm.setAttribute('yChannelSelector','G');dm.setAttribute('result','d');f2.appendChild(dm);
  var bl2=document.createElementNS("http://www.w3.org/2000/svg","feGaussianBlur");bl2.setAttribute('in','d');bl2.setAttribute('stdDeviation','3.5');f2.appendChild(bl2);defs.appendChild(f2);
  patchShapes.blobs.forEach(function(b,i){
    var gr=document.createElementNS("http://www.w3.org/2000/svg","radialGradient");gr.setAttribute('id','g'+i);gr.setAttribute('fx',b.fx);gr.setAttribute('fy',b.fy);
    var s1=document.createElementNS("http://www.w3.org/2000/svg","stop");s1.setAttribute('offset','0%');s1.setAttribute('stop-color','rgba('+rgb+',0.55)');gr.appendChild(s1);
    var s2=document.createElementNS("http://www.w3.org/2000/svg","stop");s2.setAttribute('offset',b.midStop+'%');s2.setAttribute('stop-color','rgba('+rgb+',0.22)');gr.appendChild(s2);
    var s3=document.createElementNS("http://www.w3.org/2000/svg","stop");s3.setAttribute('offset','100%');s3.setAttribute('stop-color','rgba('+rgb+',0)');gr.appendChild(s3);
    defs.appendChild(gr);
  });
  svg.appendChild(defs);
  patchShapes.blobs.forEach(function(b,i){var el=document.createElementNS("http://www.w3.org/2000/svg","path");el.setAttribute('d',b.d);el.setAttribute('fill','url(#g'+i+')');el.setAttribute('filter','url(#wcT)');svg.appendChild(el)});
  patchShapes.satellites.forEach(function(s){var el=document.createElementNS("http://www.w3.org/2000/svg","path");el.setAttribute('d',s.d);el.setAttribute('fill','rgba('+rgb+',0.12)');el.setAttribute('filter','url(#wcB)');svg.appendChild(el)});
  patchShapes.dots.forEach(function(d){var el=document.createElementNS("http://www.w3.org/2000/svg","circle");el.setAttribute('cx',d.cx);el.setAttribute('cy',d.cy);el.setAttribute('r',d.r);el.setAttribute('fill','rgba('+rgb+',0.14)');el.setAttribute('filter','url(#wcB)');svg.appendChild(el)});
}

/* ===================== LANGUAGE SWITCH ===================== */
function setLang(l){
  LANG=l;
  document.getElementById('langEn').className='lang-btn'+(l==='en'?' active':'');
  document.getElementById('langZh').className='lang-btn'+(l==='zh'?' active':'');
  applyLang();
}

function applyLang(){
  var t=T[LANG];
  document.getElementById('introTitle').innerHTML=t.introTitle;
  document.getElementById('introSub').innerHTML=t.introSub;
  document.getElementById('startBtn').textContent=t.start;
  document.getElementById('restartBtn').textContent=t.restart;
  document.getElementById('rLabel').textContent=t.resultLabel;
  // Build question screens
  for(var q=1;q<=5;q++){
    document.getElementById('qn'+q).textContent=t.qNum[q-1];
    document.getElementById('qt'+q).textContent=t.qText[q-1];
    var ch=document.getElementById('ch'+q);
    ch.innerHTML='';
    var btnA=document.createElement('button');btnA.className='choice-btn';
    btnA.textContent=t.opts[q-1][0];
    btnA.setAttribute('onclick','ans('+q+',"a")');
    var btnB=document.createElement('button');btnB.className='choice-btn';
    btnB.textContent=t.opts[q-1][1];
    btnB.setAttribute('onclick','ans('+q+',"b")');
    ch.appendChild(btnA);ch.appendChild(btnB);
  }
}
applyLang();

/* ===================== QUIZ LOGIC ===================== */
var Ans={},mouseX=-999,mouseY=-999,floaters=[],rafId=null;

function go(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  setTimeout(function(){
    var screen=document.getElementById(id);
    screen.classList.add('active');
    if(id.startsWith('q')){
      buildProg(parseInt(id[1]));
      var choices=screen.querySelector('.choices');
      if(choices&&Math.random()>.5) choices.appendChild(choices.firstElementChild);
    }
  },80);
}

function buildProg(n){
  var el=document.getElementById('prog'+n);el.innerHTML='';
  for(var i=1;i<=5;i++){var d=document.createElement('div');d.className='dot'+(i<n?' filled':'')+(i===n?' current':'');el.appendChild(d)}
}

function ans(q,c){
  Ans[q]=c;
  var t=T[LANG];
  var fb=document.getElementById('fb'+q);
  fb.textContent=t.fb[q-1][c==='a'?0:1];
  setTimeout(function(){fb.classList.add('visible')},50);
  setTimeout(function(){fb.classList.remove('visible');if(q<5)go('q'+(q+1));else showResult()},1100);
}

/* ===================== RESULT ===================== */
function showResult(){
  var intro=(Ans[1]==='a'?1:0)+(Ans[4]==='a'?1:0);
  var chaos=(Ans[2]==='a'?1:0)+(Ans[3]==='b'?1:0);
  var aesth=Ans[5];
  var key=intro+'-'+chaos;
  var t=T[LANG];

  var variants=PM[key];
  var pal=variants[Math.floor(Math.random()*variants.length)];
  var bg=pal[0],accent=pal[1],hl=pal[2],txt=pal[3];

  document.body.style.backgroundColor=bg;document.body.style.color=txt;

  var p=t.pers[key];
  document.getElementById('rLabel').textContent=t.resultLabel;
  document.getElementById('rTitle').textContent=p.name;
  document.getElementById('rSub').textContent=p.kw;
  document.getElementById('rDesc').textContent=t.descTemp[intro]+t.descChaos[chaos]+t.descAesth[aesth];

  var row=document.getElementById('paletteRow');row.innerHTML='';
  for(var i=0;i<4;i++){
    var hex=pal[4+i].toUpperCase();
    var wrap=document.createElement('div');wrap.className='swatch-wrap';
    var sw=document.createElement('div');sw.className='swatch';sw.style.backgroundColor=hex;
    sw.onclick=(function(h,w){return function(){
      navigator.clipboard.writeText(h).then(function(){var m=w.querySelector('.copied-msg');m.classList.add('show');setTimeout(function(){m.classList.remove('show')},1200)});
    }})(hex,wrap);
    var tip=document.createElement('div');tip.className='hex-tip';tip.textContent=hex;
    var msg=document.createElement('div');msg.className='copied-msg';msg.textContent=t.copied;msg.style.color=txt;
    wrap.appendChild(sw);wrap.appendChild(tip);wrap.appendChild(msg);row.appendChild(wrap);
  }

  document.getElementById('restartBtn').style.background=accent;
  document.getElementById('restartBtn').style.color=bg;
  document.getElementById('restartBtn').textContent=t.restart;

  drawPatches(accent);
  setupGlow(accent);
  spawnClipart(accent,hl,aesth);
  go('result');
}

/* ===================== CURSOR GLOW ===================== */
var glowEl=document.getElementById('cursorGlow'),glowActive=false;
function setupGlow(color){
  var rgb=parseInt(color.slice(1,3),16)+','+parseInt(color.slice(3,5),16)+','+parseInt(color.slice(5,7),16);
  glowEl.style.background='radial-gradient(circle,rgba('+rgb+',0.35) 0%,rgba('+rgb+',0.12) 40%,rgba('+rgb+',0) 70%)';
  glowEl.classList.add('visible');glowActive=true;
}
document.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY;if(glowActive){glowEl.style.left=e.clientX+'px';glowEl.style.top=e.clientY+'px'}});
document.addEventListener('touchmove',function(e){if(e.touches.length){mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;if(glowActive){glowEl.style.left=mouseX+'px';glowEl.style.top=mouseY+'px'}}},{passive:true});
document.addEventListener('touchend',function(){mouseX=-999;mouseY=-999});

/* ===================== FLOATING CLIPART ===================== */
function spawnClipart(accent,hl,aesth){
  var layer=document.getElementById('floatLayer');layer.innerHTML='';layer.classList.remove('visible');
  floaters=[];if(rafId)cancelAnimationFrame(rafId);
  var pool=AESTH_CLIPS[aesth].slice(),picked=[];
  for(var i=0;i<2;i++){var idx=Math.floor(Math.random()*pool.length);picked.push(pool.splice(idx,1)[0])}
  var colors=[accent,hl],W=window.innerWidth,H=window.innerHeight;
  for(var i=0;i<14;i++){
    var type=picked[i%2],col=colors[i%2],svgStr=CLIPS[type].replace(/CCC/g,col);
    var size=18+Math.random()*16;
    var el=document.createElement('div');el.className='clipart';
    el.innerHTML='<span class="clipart-inner">'+svgStr+'</span>';
    el.style.width=size+'px';el.style.height=size+'px';
    el.querySelector('.clipart-inner').style.animationDelay=(Math.random()*3).toFixed(1)+'s';
    layer.appendChild(el);
    floaters.push({el:el,x:Math.random()*W,y:Math.random()*H,vx:0,vy:0,driftX:.12+Math.random()*.2,driftY:.08+Math.random()*.15,phase:Math.random()*Math.PI*2,size:size});
  }
  setTimeout(function(){layer.classList.add('visible')},300);
  animate();
}
function animate(){
  var W=window.innerWidth,H=window.innerHeight,t=Date.now()*.001;
  for(var i=0;i<floaters.length;i++){
    var f=floaters[i];
    f.x+=Math.sin(t*f.driftX+f.phase)*.35;f.y+=Math.cos(t*f.driftY+f.phase)*.28;
    var dx=f.x-mouseX,dy=f.y-mouseY,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<120&&dist>1){var force=(120-dist)/120*3;f.vx+=(dx/dist)*force;f.vy+=(dy/dist)*force}
    f.x+=f.vx;f.y+=f.vy;f.vx*=.91;f.vy*=.91;
    var pad=f.size;
    if(f.x<-pad)f.x=W+pad;if(f.x>W+pad)f.x=-pad;
    if(f.y<-pad)f.y=H+pad;if(f.y>H+pad)f.y=-pad;
    f.el.style.transform='translate('+f.x.toFixed(1)+'px,'+f.y.toFixed(1)+'px)';
  }
  rafId=requestAnimationFrame(animate);
}

/* ===================== RESTART ===================== */
function restart(){
  Ans={};
  document.body.style.backgroundColor='#f5f0eb';document.body.style.color='#4a4a4a';
  document.getElementById('floatLayer').classList.remove('visible');
  document.getElementById('floatLayer').innerHTML='';
  glowEl.classList.remove('visible');glowActive=false;
  floaters=[];if(rafId){cancelAnimationFrame(rafId);rafId=null}
  go('intro');
}
</script>
