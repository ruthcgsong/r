<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>VN Engine v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Caveat:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow-x:hidden;min-height:100vh}
#app{min-height:100vh;position:relative;transition:opacity 300ms ease}
.fade-out{opacity:0}

.bg-base{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#1a1a3a 0%,#0d0d2a 40%,#151530 100%)}
.bg-glow{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 55%,rgba(100,80,160,0.06) 0%,transparent 60%)}
.star{position:fixed;border-radius:50%;background:white;pointer-events:none;z-index:0}
@keyframes tw{0%,100%{opacity:0.1}50%{opacity:0.45}}
.particle-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.part{position:absolute;border-radius:50%;background:rgba(200,180,230,0.5)}
@keyframes pf{0%{transform:translateY(105vh)}100%{transform:translateY(-20px)}}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.text-page{position:relative;z-index:2;max-width:860px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:6vh 5vw}
.ch-label{font-family:'Caveat',cursive;font-size:0.88rem;color:rgba(195,185,220,0.45);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px}
.ch-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:2.1rem;color:rgba(215,208,235,0.88);letter-spacing:0.04em;margin-bottom:12px}
.ch-title em{font-style:italic;font-weight:300;color:rgba(185,170,220,0.72)}
.frost{background:rgba(20,18,45,0.25);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.025);border-radius:2px;padding:28px 32px;margin-bottom:32px}
.story-p{font-family:'EB Garamond','Noto Serif SC','SimSun',serif;font-size:1.1rem;line-height:2.05;color:rgba(205,198,222,0.78);letter-spacing:0.02em;margin-bottom:0.6em}

.divider-svg{display:block;margin:18px 0 32px}

/* Choices */
.choice-label{font-family:'Caveat',cursive;font-size:1.05rem;color:rgba(195,185,220,0.4);margin-bottom:18px}
.choices{display:flex;flex-direction:column;gap:14px}
.choice-btn{position:relative;background:transparent;border:none;padding:18px 24px 18px 54px;cursor:pointer;text-align:left;font-family:'EB Garamond','Noto Serif SC',serif;font-size:1.05rem;color:rgba(205,198,222,0.72);line-height:1.6;transition:all 0.35s}
.choice-btn:hover{background:rgba(140,120,200,0.04)}
.choice-btn:hover .sk-svg{opacity:0.55}
.choice-btn .sk-svg{position:absolute;inset:0;pointer-events:none;opacity:0.3;transition:opacity 0.35s}
.choice-letter{position:absolute;left:20px;top:50%;transform:translateY(-50%);font-family:'Caveat',cursive;font-size:1.15rem;color:rgba(195,185,220,0.4);font-weight:600}

/* After-choice text */
.after-choice{text-align:center;margin:20px 0}
.after-choice p{font-family:'Caveat',cursive;font-size:0.95rem;color:rgba(195,185,220,0.4);font-style:italic;animation:fi 0.6s ease}

/* Activity links */
.activity-area{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.activity-btn{font-family:'Caveat',cursive;font-size:1.05rem;color:rgba(185,170,220,0.65);background:rgba(140,120,200,0.06);border:1px solid rgba(140,120,200,0.15);border-radius:12px;padding:12px 32px;cursor:pointer;transition:all 0.3s;letter-spacing:0.04em;min-width:220px;text-align:center}
.activity-btn:hover{background:rgba(140,120,200,0.12);color:rgba(200,185,235,0.85);border-color:rgba(140,120,200,0.3)}
.skip-btn{font-family:'Caveat',cursive;font-size:0.85rem;color:rgba(195,185,220,0.28);background:none;border:none;cursor:pointer;padding:8px 16px;margin-top:4px;transition:color 0.3s}
.skip-btn:hover{color:rgba(195,185,220,0.5)}

/* Continue */
.continue{text-align:center;cursor:pointer;padding:16px 0;margin-top:8px}
.continue span{font-family:'Caveat',cursive;font-size:0.9rem;color:rgba(195,185,220,0.3);border-bottom:1px dotted rgba(195,185,220,0.2);padding-bottom:3px}

/* End page */
.end-page{position:relative;z-index:2;max-width:860px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:6vh 5vw}
.end-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:2rem;color:rgba(215,208,235,0.6);letter-spacing:0.08em}

/* Component overlay */
.comp-overlay{position:fixed;inset:0;z-index:100;background:rgba(10,10,26,0.95);display:flex;justify-content:center;align-items:center;flex-direction:column;gap:24px}
.comp-placeholder{text-align:center;color:rgba(205,198,222,0.6);font-family:'EB Garamond',serif;font-size:1.1rem}
.comp-placeholder p{margin-bottom:12px}
.comp-done-btn{font-family:'Caveat',cursive;font-size:1rem;color:rgba(185,170,220,0.65);background:rgba(140,120,200,0.08);border:1px solid rgba(140,120,200,0.2);border-radius:12px;padding:10px 28px;cursor:pointer;transition:all 0.3s}
.comp-done-btn:hover{background:rgba(140,120,200,0.15);color:rgba(200,185,235,0.85)}

/* Debug panel */
.debug-panel{position:fixed;top:15px;right:15px;z-index:50;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:14px 16px;width:300px;font-size:0.68rem;color:#aaa;font-family:monospace;display:none;flex-direction:column;gap:4px;max-height:80vh;overflow-y:auto}
.debug-panel.show{display:flex}
.debug-panel .dg-title{color:#666;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;margin-top:8px;margin-bottom:4px;font-family:system-ui}
.debug-panel .dg-title:first-child{margin-top:0}
.debug-panel .dg-row{display:flex;justify-content:space-between;padding:2px 4px;border-radius:3px}
.debug-panel .dg-row:hover{background:rgba(255,255,255,0.04)}
.debug-panel .dg-key{color:#888}
.debug-panel .dg-val{color:#ccc;font-weight:bold}
.debug-panel .dg-val.changed{color:#a8d8a8}
.debug-hint{position:fixed;bottom:15px;right:15px;color:rgba(255,255,255,0.18);font-size:0.7rem;z-index:5;font-family:system-ui}
</style>
</head>
<body>
<div class="bg-base"></div><div class="bg-glow"></div>
<div id="stars"></div>
<div class="particle-layer" id="particles"></div>
<div class="debug-panel" id="debugPanel"></div>
<div class="debug-hint" id="debugHint" style="display:none">按 D 调试</div>
<div id="app"></div>
<div id="compMount"></div>

<script>
/* ================================================================
   ✦ CONFIG
================================================================ */
var DEBUG_MODE = true;
var FADE_MS = 300;
var STORY_URL = 'story.json'; // path to JSON file

/* ================================================================
   STATE
================================================================ */
var story = null;
var pageIndex = {};  // id -> page object
var currentId = null;
var vars = {};       // all variables
var app = document.getElementById('app');
var compMount = document.getElementById('compMount');

/* ================================================================
   COMPONENT REGISTRY
   Register component handlers here. Each receives (config, callback).
   callback(effects) when done — effects is {varName: delta, ...}
================================================================ */
var COMPONENTS = {};

// Placeholder: tarot
COMPONENTS.tarot = function(config, done) {
  var h = '<div class="comp-overlay" id="compOverlay">';
  h += '<div class="comp-placeholder">';
  h += '<p style="font-size:2rem;margin-bottom:16px">\ud83c\udccf</p>';
  h += '<p>Tarot Component</p>';
  h += '<p style="font-size:0.85rem;color:rgba(195,185,220,0.35)">（组件开发中 — 点击下方完成）</p>';
  h += '</div>';
  h += '<button class="comp-done-btn" onclick="compFinish({})">完成（无变化）</button>';
  h += '<button class="comp-done-btn" onclick="compFinish({d_innocence:1})" style="margin-top:-8px">完成（d_innocence +1 测试）</button>';
  h += '</div>';
  compMount.innerHTML = h;
  window._compDone = done;
};

// Placeholder: constellation
COMPONENTS.constellation = function(config, done) {
  var h = '<div class="comp-overlay" id="compOverlay">';
  h += '<div class="comp-placeholder">';
  h += '<p style="font-size:2rem;margin-bottom:16px">\u2b50</p>';
  h += '<p>Constellation Component</p>';
  h += '<p style="font-size:0.85rem;color:rgba(195,185,220,0.35)">dataKey: ' + (config.dataKey||'none') + '</p>';
  h += '<p style="font-size:0.85rem;color:rgba(195,185,220,0.35)">（组件开发中 — 点击下方完成）</p>';
  h += '</div>';
  h += '<button class="comp-done-btn" onclick="compFinish({})">完成（无变化）</button>';
  h += '<button class="comp-done-btn" onclick="compFinish({rel_traveller:1})" style="margin-top:-8px">完成（rel_traveller +1 测试）</button>';
  h += '</div>';
  compMount.innerHTML = h;
  window._compDone = done;
};

function compFinish(effects) {
  compMount.innerHTML = '';
  if (window._compDone) window._compDone(effects);
  window._compDone = null;
}

/* ================================================================
   INIT
================================================================ */
(function initBG(){
  var sh='';
  for(var i=0;i<40;i++){
    var x=Math.random()*100,y=Math.random()*100,s=1+Math.random()*1.5,o=(0.1+Math.random()*0.35).toFixed(2),d=(3+Math.random()*4).toFixed(1);
    sh+='<div class="star" style="width:'+s+'px;height:'+s+'px;left:'+x+'%;top:'+y+'%;opacity:'+o+';animation:tw '+d+'s ease-in-out infinite;animation-delay:-'+(Math.random()*5).toFixed(1)+'s"></div>';
  }
  document.getElementById('stars').innerHTML=sh;
  var ph='';
  for(var i=0;i<14;i++){
    var x=Math.random()*100,sz=(2+Math.random()*3).toFixed(1),o=(0.05+Math.random()*0.06).toFixed(3),dur=(20+Math.random()*18).toFixed(0),del=(Math.random()*25).toFixed(0);
    ph+='<div class="part" style="left:'+x+'%;width:'+sz+'px;height:'+sz+'px;opacity:'+o+';animation:pf '+dur+'s linear infinite;animation-delay:-'+del+'s"></div>';
  }
  document.getElementById('particles').innerHTML=ph;
  if(DEBUG_MODE) document.getElementById('debugHint').style.display='block';
})();

// Load story
fetch(STORY_URL).then(function(r){return r.json()}).then(function(data){
  story = data;
  // Build index
  if(story.pages){
    for(var i=0;i<story.pages.length;i++){
      var p=story.pages[i];
      if(p.id) pageIndex[p.id]=p;
    }
  }
  // Init variables
  vars = {};
  if(story.variables){
    for(var k in story.variables) vars[k]=story.variables[k];
  }
  // Start
  currentId = story.start || (story.pages&&story.pages[0]?story.pages[0].id:null);
  if(currentId) renderPage(currentId);
}).catch(function(err){
  app.innerHTML='<div class="text-page"><div class="frost"><p class="story-p">无法加载 story.json<br><br>'+err.message+'</p></div></div>';
});

/* ================================================================
   APPLY EFFECTS
================================================================ */
function applyEffects(effects){
  if(!effects) return;
  for(var k in effects){
    if(vars[k]===undefined) vars[k]=0;
    vars[k] += effects[k];
  }
  updateDebug();
}

/* ================================================================
   RENDER PAGE
================================================================ */
function renderPage(id){
  var pg = pageIndex[id];
  if(!pg){app.innerHTML='<div class="text-page"><p class="story-p">Page not found: '+id+'</p></div>';return;}
  currentId = id;

  app.classList.add('fade-out');
  setTimeout(function(){
    if(pg.type==='normal') renderNormal(pg);
    else if(pg.type==='end') renderEnd(pg);
    else renderNormal(pg); // fallback
    app.classList.remove('fade-out');
    updateDebug();
  }, FADE_MS);
}

/* ================================================================
   NORMAL PAGE
================================================================ */
function renderNormal(pg){
  var h='<div class="text-page">';

  // Header
  if(pg.title){
    h+='<div>';
    if(pg.label) h+='<p class="ch-label">'+pg.label+'</p>';
    if(pg.title.indexOf('\u00b7')>=0){
      var parts=pg.title.split('\u00b7');
      h+='<h2 class="ch-title">'+parts[0]+'<em>\u00b7'+parts[1]+'</em></h2>';
    }else{
      h+='<h2 class="ch-title">'+pg.title+'</h2>';
    }
    h+='<svg class="divider-svg" width="180" height="8" viewBox="0 0 180 8"><path d="M2,4 L18,3.8 L35,4.2 L52,3.9 L70,4.1 L88,3.8 L105,4.2 L122,3.9 L140,4.1 L158,3.8 L178,4" fill="none" stroke="rgba(185,175,215,0.4)" stroke-width="0.8" stroke-linecap="round"/><circle cx="90" cy="4" r="1.5" fill="rgba(185,175,215,0.28)"/></svg>';
    h+='</div>';
  }

  // Body
  h+='<div class="frost">';
  if(pg.paragraphs){
    for(var i=0;i<pg.paragraphs.length;i++){
      var lines=pg.paragraphs[i].split('\n');
      for(var j=0;j<lines.length;j++){
        if(lines[j]==='') h+='<div style="height:16px"></div>';
        else h+='<p class="story-p">'+lines[j]+'</p>';
      }
    }
  }
  h+='</div>';

  // Feedback / after-choice / activities placeholder
  h+='<div id="afterArea"></div>';

  // Choices
  if(pg.choices && pg.choices.length){
    h+='<div id="choiceArea">';
    if(pg.choiceLabel) h+='<p class="choice-label">'+pg.choiceLabel+'</p>';
    h+='<div class="choices">';
    var SKS = [
      '<svg width="100%" height="100%" viewBox="0 0 600 58" preserveAspectRatio="none" class="sk-svg"><path d="M6,5 C3,3 5,2 10,2 L285,3 Q300,2 310,3 L590,2 C598,2 597,5 596,8 L597,25 Q598,35 596,48 C597,54 595,55 590,53 L305,54 Q290,53 280,54 L8,53 C3,54 2,52 3,48 L2,28 Q1,15 4,4 Z" fill="none" stroke="rgba(185,175,215,0.5)" stroke-width="1.1" stroke-linecap="round" stroke-dasharray="5,4"/></svg>',
      '<svg width="100%" height="100%" viewBox="0 0 600 58" preserveAspectRatio="none" class="sk-svg"><path d="M5,4 C2,2 4,1 9,2 L290,4 Q305,2 315,3 L592,3 C599,3 598,6 597,9 L598,27 Q599,38 597,49 C598,55 596,56 591,54 L310,52 Q295,54 285,53 L9,54 C3,55 2,53 3,49 L2,26 Q1,14 5,3 Z" fill="none" stroke="rgba(185,175,215,0.5)" stroke-width="1.1" stroke-linecap="round" stroke-dasharray="6,4" stroke-dashoffset="2"/></svg>'
    ];
    var letters=['A','B','C','D'];
    for(var i=0;i<pg.choices.length;i++){
      h+='<button class="choice-btn" onclick="doChoice('+i+')">';
      h+=SKS[i%2];
      h+='<span class="choice-letter">'+letters[i]+'</span>';
      h+='<span>'+pg.choices[i].text+'</span></button>';
    }
    h+='</div></div>';
  } else if(pg.next) {
    // No choices — show continue
    h+='<div class="continue" onclick="goNext()"><span>继续 →</span></div>';
  }

  h+='</div>';
  app.innerHTML=h;
}

/* ================================================================
   CHOICE HANDLER
================================================================ */
function doChoice(idx){
  var pg=pageIndex[currentId];
  if(!pg||!pg.choices) return;
  var ch=pg.choices[idx];

  // Apply effects
  if(ch.effects) applyEffects(ch.effects);

  // Hide choices
  var ca=document.getElementById('choiceArea');
  if(ca) ca.style.display='none';

  // Show after-choice text + activities
  var area=document.getElementById('afterArea');
  var h='';

  if(pg.afterChoiceText){
    h+='<div class="after-choice"><p>'+pg.afterChoiceText+'</p></div>';
  }

  if(pg.activities && pg.activities.length){
    h+='<div class="activity-area">';
    for(var i=0;i<pg.activities.length;i++){
      var act=pg.activities[i];
      h+='<button class="activity-btn" onclick="startActivity('+i+')">'+act.label+'</button>';
    }
    h+='<button class="skip-btn" onclick="goNext()">'+(pg.skipActivitiesLabel||'Skip')+'</button>';
    h+='</div>';
  } else {
    // No activities — auto advance after delay
    setTimeout(goNext, 2200);
  }

  area.innerHTML=h;
}

/* ================================================================
   ACTIVITY (COMPONENT) HANDLER
================================================================ */
function startActivity(idx){
  var pg=pageIndex[currentId];
  if(!pg||!pg.activities) return;
  var act=pg.activities[idx];
  var comp=COMPONENTS[act.component];
  if(!comp){
    console.warn('Component not found:',act.component);
    goNext();
    return;
  }
  // Hide activity buttons
  var area=document.getElementById('afterArea');
  if(area) area.innerHTML='';

  // Launch component
  comp(act, function(effects){
    if(effects) applyEffects(effects);
    goNext();
  });
}

/* ================================================================
   NAVIGATION
================================================================ */
function goNext(){
  var pg=pageIndex[currentId];
  if(!pg||!pg.next) return;
  renderPage(pg.next);
}

/* ================================================================
   END PAGE
================================================================ */
function renderEnd(pg){
  var h='<div class="end-page">';
  h+='<p class="end-text">'+(pg.text||'\u7ed3\u675f')+'</p>';
  h+='</div>';
  app.innerHTML=h;
  updateDebug();
}

/* ================================================================
   DEBUG PANEL
================================================================ */
if(DEBUG_MODE){
  document.addEventListener('keydown',function(e){
    if(e.key==='d'||e.key==='D'){
      document.getElementById('debugPanel').classList.toggle('show');
    }
  });
}

function updateDebug(){
  if(!DEBUG_MODE) return;
  var panel=document.getElementById('debugPanel');
  var h='';

  // Group variables by prefix
  var groups={};
  for(var k in vars){
    var prefix=k.split('_')[0];
    if(!groups[prefix]) groups[prefix]=[];
    groups[prefix].push(k);
  }

  var groupLabels={d:'维度变量 Dimensions',rel:'关系变量 Relations',item:'物品 Items',flag:'标记 Flags'};

  for(var prefix in groups){
    h+='<div class="dg-title">'+(groupLabels[prefix]||prefix)+'</div>';
    var keys=groups[prefix].sort();
    for(var i=0;i<keys.length;i++){
      var k=keys[i];
      var v=vars[k];
      var changed=v!==0;
      h+='<div class="dg-row"><span class="dg-key">'+k+'</span><span class="dg-val'+(changed?' changed':'')+'">'+v+'</span></div>';
    }
  }

  h+='<div class="dg-title" style="margin-top:12px">当前页面</div>';
  h+='<div class="dg-row"><span class="dg-key">id</span><span class="dg-val">'+currentId+'</span></div>';

  panel.innerHTML=h;
}
</script>
</body>
</html>
